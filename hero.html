<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HarmonicaHero — Hero Mode</title>
  <script src="resources/tabs/songs-bundle.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a12;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      width: 100%;
      background: #13132a;
      border-bottom: 1px solid #1e2040;
      display: flex;
      justify-content: center;
      gap: 4px;
      padding: 10px 16px;
    }
    nav a {
      color: #64748b;
      text-decoration: none;
      padding: 7px 20px;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    nav a:hover  { color: #e2e8f0; background: #1e2040; }
    nav a.active { color: #fff; background: #1d4ed8; }

    /* ── Song Picker ── */
    #view-picker {
      width: 100%;
      max-width: 800px;
      padding: 32px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .picker-header { text-align: center; }
    .picker-header h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .picker-header p { color: #64748b; margin-top: 6px; font-size: 0.95rem; }

    .search-wrap {
      width: 100%;
      max-width: 480px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: #13132a;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 12px 16px 12px 42px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #searchInput:focus { border-color: #3b82f6; }
    #searchInput::placeholder { color: #334155; }

    #songGrid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .song-card {
      background: #0d0d1e;
      border: 1px solid #1e2040;
      border-radius: 12px;
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .song-card:hover {
      border-color: #3b82f6;
      background: #0f0f28;
      transform: translateY(-2px);
    }
    .song-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .song-title { font-size: 1.05rem; font-weight: 700; color: #f1f5f9; line-height: 1.2; }
    .song-artist { font-size: 0.78rem; color: #64748b; margin-top: 2px; }
    .song-desc { font-size: 0.78rem; color: #475569; line-height: 1.4; }
    .song-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .badge-beginner     { background: #14532d; color: #4ade80; }
    .badge-intermediate { background: #451a03; color: #fb923c; }
    .badge-advanced     { background: #450a0a; color: #f87171; }
    .badge-bpm   { background: #1e2040; color: #94a3b8; }
    .badge-holes { background: #1e2040; color: #94a3b8; }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      color: #334155;
      padding: 40px;
      font-size: 0.9rem;
    }

    .picker-error {
      color: #f87171;
      background: #450a0a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 0.85rem;
      max-width: 480px;
      text-align: center;
    }

    /* ── Highway view ── */
    #view-highway {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 740px;
      padding: 16px 12px 24px;
      gap: 10px;
    }

    #highway {
      display: block;
      border-radius: 10px;
      border: 1px solid #1e2040;
      width: 100%;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      width: 100%;
      background: #13132a;
      border: 1px solid #1e2040;
      border-radius: 10px;
      padding: 10px 18px;
    }

    .stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .stat-val  { font-size: 1.4rem; font-weight: 800; color: #f8fafc; line-height: 1; }
    .stat-label { font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; color: #475569; }

    #comboVal { color: #facc15; }
    #accVal   { color: #4ade80; }

    .stat-sep { width: 1px; height: 30px; background: #1e2040; flex-shrink: 0; }

    .note-badge {
      font-size: 2rem;
      font-weight: 800;
      color: #334155;
      line-height: 1;
      transition: color 0.1s;
    }
    .note-badge.active { color: #f8fafc; }
    .note-oct { font-size: 1rem; color: #64748b; }

    .spacer { flex: 1; }

    /* ── Controls bar ── */
    .controls-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      flex-wrap: wrap;
    }

    .song-name-tag {
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .bpm-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #94a3b8;
      white-space: nowrap;
    }
    .controls-bar input[type=range] {
      appearance: none;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #3b82f6 var(--pct, 40%), #334155 var(--pct, 40%));
      border: none;
      outline: none;
      cursor: pointer;
    }
    .controls-bar input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #f8fafc;
      border: 2px solid #3b82f6;
      cursor: pointer;
    }
    .controls-bar input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #f8fafc;
      border: 2px solid #3b82f6;
      cursor: pointer;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #94a3b8;
      cursor: pointer;
      white-space: nowrap;
    }
    .toggle-row input { cursor: pointer; accent-color: #1d4ed8; }

    #startBtn {
      background: #1d4ed8;
      color: #fff;
      border: none;
      padding: 9px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #startBtn:hover { background: #2563eb; }
    #startBtn.stop  { background: #991b1b; }
    #startBtn.stop:hover { background: #b91c1c; }

    #backBtn {
      background: transparent;
      color: #64748b;
      border: 1px solid #2d3148;
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    #backBtn:hover { color: #e2e8f0; border-color: #475569; }

    /* ── Results overlay ── */
    #results {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a12ee;
      z-index: 10;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
    #results.show { display: flex; }
    #results .grade { font-size: 6rem; font-weight: 900; line-height: 1; }
    #results .grade.S { color: #facc15; }
    #results .grade.A { color: #4ade80; }
    #results .grade.B { color: #60a5fa; }
    #results .grade.C { color: #fb923c; }
    #results .grade.F { color: #f87171; }
    #results h2 { font-size: 1.6rem; color: #f8fafc; }
    #results p  { font-size: 1rem;   color: #94a3b8; }
    #results .btn-row { display: flex; gap: 12px; margin-top: 8px; }
    #results button {
      background: #1d4ed8; color: #fff; border: none;
      padding: 12px 32px; border-radius: 8px; font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    #results button:hover { background: #2563eb; }
    #results #chooseSongBtn { background: #334155; }
    #results #chooseSongBtn:hover { background: #475569; }
  </style>

<script>
// ── Harmonica reference ──
const HARMONICA = [
  { hole:1,  blow:['C',4], draw:['D',4] },
  { hole:2,  blow:['E',4], draw:['G',4] },
  { hole:3,  blow:['G',4], draw:['B',4] },
  { hole:4,  blow:['C',5], draw:['D',5] },
  { hole:5,  blow:['E',5], draw:['F',5] },
  { hole:6,  blow:['G',5], draw:['A',5] },
  { hole:7,  blow:['C',6], draw:['B',5] },
  { hole:8,  blow:['E',6], draw:['D',6] },
  { hole:9,  blow:['G',6], draw:['F',6] },
  { hole:10, blow:['C',7], draw:['A',6] },
];

const HOLE_COLORS = [
  '#ef4444','#f97316','#f59e0b','#eab308','#84cc16',
  '#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899',
];

function holeNote(hole, action) { return HARMONICA[hole - 1][action]; }

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function freqToNoteInfo(freq) {
  const noteNum = 12 * Math.log2(freq / 440) + 69;
  const rounded = Math.round(noteNum);
  const name    = NOTE_NAMES[((rounded % 12) + 12) % 12];
  const octave  = Math.floor(rounded / 12) - 1;
  return { name, octave };
}

function noteToFreq(name, octave) {
  const idx = NOTE_NAMES.indexOf(name);
  return 440 * Math.pow(2, ((octave + 1) * 12 + idx - 69) / 12);
}

// ── Pitch detection ──
function autoCorrelate(buf, sampleRate) {
  const SIZE = buf.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.01) return -1;

  const minLag = Math.floor(sampleRate / 2300);
  const maxLag = Math.ceil(sampleRate / 190);
  const c = new Float32Array(maxLag + 1);
  for (let lag = minLag; lag <= maxLag; lag++) {
    let sum = 0, n = SIZE - lag;
    for (let i = 0; i < n; i++) sum += buf[i] * buf[i + lag];
    c[lag] = sum / n;
  }

  let c0 = 0;
  for (let i = 0; i < SIZE; i++) c0 += buf[i] * buf[i];
  c0 /= SIZE;

  let globalMax = 0;
  for (let i = minLag; i <= maxLag; i++) if (c[i] > globalMax) globalMax = c[i];
  if (globalMax / c0 < 0.15) return -1;

  const threshold = 0.80 * globalMax, WIN = 2;
  let bestPos = -1;
  for (let i = minLag + WIN; i <= maxLag - WIN; i++) {
    if (c[i] < threshold) continue;
    let peak = true;
    for (let j = 1; j <= WIN; j++) {
      if (c[i-j] > c[i] || c[i+j] > c[i]) { peak = false; break; }
    }
    if (peak) { bestPos = i; break; }
  }
  if (bestPos < 0) return -1;

  let T = bestPos;
  if (bestPos > minLag && bestPos < maxLag) {
    const x1 = c[bestPos-1], x2 = c[bestPos], x3 = c[bestPos+1];
    const a = (x1 + x3 - 2*x2) / 2, b = (x3 - x1) / 2;
    if (a < 0) T = bestPos - b / (2*a);
  }
  return sampleRate / T;
}

// ── Canvas setup ──
const canvas = document.getElementById('highway');
const ctx    = canvas.getContext('2d');

const NOTE_H        = 40;
const TRAVEL_MS     = 2200;
const HIT_WINDOW_MS = 280;
const HARM_H        = 82;
const INTRO_BEATS   = 3;

let CW, CH, LANE_W, HARM_Y, STRIKE_Y, NOTE_SPEED;

function resizeCanvas() {
  CW         = Math.min(window.innerWidth - 24, 720);
  CH         = Math.round(CW * 0.78);
  canvas.width  = CW;
  canvas.height = CH;
  LANE_W     = CW / 10;
  HARM_Y     = CH - HARM_H;
  STRIKE_Y   = HARM_Y + 26;
  NOTE_SPEED = (STRIKE_Y + NOTE_H) / TRAVEL_MS;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawHighway(-1e9); });

// ── Game state ──
let state          = 'PICKER';
let audioCtx, analyser, micSource;
let animId         = null;
let audioGameStart = 0;
let playAlongOscs  = [];
let songNotes      = [];
let gameStart      = 0;
let beatMs         = 0;
let score = 0, combo = 0, totalNotes = 0, hitNotes = 0;
let currentNote      = null;
let lastDetectedKey  = '';
let flashHoles       = new Map();
let wrongHoles       = new Map();
let countdownVal     = 0;
let currentSong      = null;   // the loaded song JSON

function buildNotes(song, bpm) {
  beatMs = 60000 / bpm;
  return song.notes.map(n => {
    const [noteName, noteOctave] = holeNote(n.hole, n.action);
    return { ...n, noteName, noteOctave, hitTime: (n.beat + INTRO_BEATS) * beatMs, state: 'pending' };
  });
}

// ── Rendering ──
function drawHarmonica(now) {
  const grad = ctx.createLinearGradient(0, HARM_Y, 0, CH);
  grad.addColorStop(0, '#1a1020');
  grad.addColorStop(1, '#0d0810');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, HARM_Y, CW, HARM_H, [0, 0, 8, 8]);
  ctx.fill();

  ctx.fillStyle = '#2a2838';
  ctx.fillRect(0, HARM_Y, CW, 5);

  const holeTop = HARM_Y + 14;
  const holeH   = HARM_H - 28;

  for (let i = 0; i < 10; i++) {
    const hole  = i + 1;
    const color = HOLE_COLORS[i];
    const cx    = i * LANE_W + LANE_W / 2;
    const hw    = LANE_W - 10;
    const x     = cx - hw / 2;

    const flash = flashHoles.get(hole);
    const wrong = wrongHoles.get(hole);

    ctx.fillStyle = '#00000088';
    ctx.beginPath();
    ctx.roundRect(x + 2, holeTop + 3, hw, holeH, 5);
    ctx.fill();

    const isLit   = flash && flash.alpha > 0;
    const isWrong = wrong && wrong.alpha > 0;
    ctx.fillStyle   = isLit ? color : isWrong ? '#555566' : color + '28';
    ctx.strokeStyle = isLit ? color : isWrong ? '#ef4444' : color + '66';
    ctx.lineWidth   = isLit ? 2.5 : isWrong ? 2.0 : 1.5;
    if (isLit)   { ctx.shadowColor = color;     ctx.shadowBlur = 14; }
    if (isWrong) { ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 10; }
    ctx.beginPath();
    ctx.roundRect(x, holeTop, hw, holeH, 5);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.fillStyle    = isLit ? '#ffffff' : isWrong ? '#ff9999' : '#ffffff55';
    ctx.font         = `bold ${Math.round(LANE_W * 0.22)}px system-ui`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(hole, cx, holeTop + holeH / 2);
  }

  for (const [hole, f] of flashHoles) { f.alpha -= 0.035; if (f.alpha <= 0) flashHoles.delete(hole); }
  for (const [hole, w] of wrongHoles) { w.alpha -= 0.025; if (w.alpha <= 0) wrongHoles.delete(hole); }
}

function drawHighway(now) {
  ctx.clearRect(0, 0, CW, CH);

  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, CW, CH);

  for (let i = 0; i < 10; i++) {
    const color = HOLE_COLORS[i];
    const lx    = i * LANE_W;
    ctx.fillStyle = color + '0c';
    ctx.fillRect(lx, 0, LANE_W, HARM_Y);
    if (i > 0) {
      ctx.strokeStyle = color + '22';
      ctx.lineWidth   = 1;
      ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, HARM_Y); ctx.stroke();
    }
  }

  if (state === 'PLAYING' && beatMs > 0) {
    const elapsed      = now - gameStart;
    const lineInterval = LANE_W * 1.5;
    for (let y = ((elapsed * NOTE_SPEED) % lineInterval); y < HARM_Y; y += lineInterval) {
      ctx.strokeStyle = '#ffffff08';
      ctx.lineWidth   = 1;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke();
    }
  }

  const elapsed = (state === 'PLAYING' || state === 'RESULTS') ? now - gameStart : -1;

  for (const note of songNotes) {
    if (note.state === 'hit') continue;
    const noteY = STRIKE_Y - (note.hitTime - elapsed) * NOTE_SPEED;
    if (noteY < -NOTE_H || noteY > CH) continue;

    const color    = HOLE_COLORS[note.hole - 1];
    const isBlow   = note.action === 'blow';
    const isActive = Math.abs(elapsed - note.hitTime) < HIT_WINDOW_MS && note.state === 'pending';
    const isMiss   = note.state === 'miss';

    const lx  = (note.hole - 1) * LANE_W;
    const pad = 4, nw = LANE_W - pad * 2;
    const nh  = Math.min(Math.max(22, Math.round((note.duration || 1) * 30)), 120);
    const nx  = lx + pad, ny = noteY - nh / 2;

    ctx.beginPath();
    ctx.roundRect(nx, ny, nw, nh, 7);

    if (isMiss) {
      ctx.fillStyle   = '#1a1020';
      ctx.strokeStyle = '#3a2040';
      ctx.lineWidth   = 1;
    } else if (isBlow) {
      ctx.fillStyle   = isActive ? color + 'cc' : color + '33';
      ctx.strokeStyle = isActive ? color         : color + '77';
      ctx.lineWidth   = isActive ? 2.5 : 1.5;
    } else {
      ctx.fillStyle   = isActive ? color + '88' : color + '1e';
      ctx.strokeStyle = isActive ? color + 'cc' : color + '55';
      ctx.lineWidth   = isActive ? 2.5 : 1.5;
    }

    if (isActive) { ctx.shadowColor = color; ctx.shadowBlur = 10; }
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    if (!isMiss) {
      ctx.fillStyle    = isActive ? '#fff' : color + 'cc';
      ctx.font         = `bold ${Math.round(LANE_W * 0.28)}px system-ui`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(isBlow ? '↑' : '↓', lx + LANE_W / 2, noteY);
    }
  }

  drawHarmonica(now);

  // Score overlay
  ctx.fillStyle = '#ffffff18';
  ctx.beginPath(); ctx.roundRect(8, 8, 130, 56, 8); ctx.fill();
  ctx.fillStyle    = '#f8fafc';
  ctx.font         = `bold ${Math.round(CW * 0.042)}px system-ui`;
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(score.toLocaleString(), 16, 14);
  ctx.fillStyle = '#facc15';
  ctx.font      = `bold ${Math.round(CW * 0.026)}px system-ui`;
  ctx.fillText(`×${comboMultiplier()} COMBO`, 16, 44);

  if (state === 'COUNTDOWN') {
    ctx.fillStyle = '#080810cc';
    ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle    = '#f8fafc';
    ctx.font         = `bold ${Math.round(CW * 0.2)}px system-ui`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(countdownVal > 0 ? countdownVal : 'GO!', CW / 2, CH / 2);
  }
}

// ── Wrong-note detection ──
function onNewNoteDetected(note) {
  if (state !== 'PLAYING') return;
  const elapsed = performance.now() - gameStart;
  let isWrong = false, expectedHole = 5;
  for (const sn of songNotes) {
    if (sn.state !== 'pending') continue;
    if (Math.abs(elapsed - sn.hitTime) <= HIT_WINDOW_MS) {
      if (note.name !== sn.noteName || note.octave !== sn.noteOctave) {
        isWrong = true; expectedHole = sn.hole;
      }
    }
  }
  if (!isWrong) return;
  let bestHole = null, bestDist = Infinity;
  for (const h of HARMONICA) {
    if (h.blow[0] === note.name || h.draw[0] === note.name) {
      const dist = Math.abs(h.hole - expectedHole);
      if (dist < bestDist) { bestDist = dist; bestHole = h.hole; }
    }
  }
  if (bestHole !== null) wrongHoles.set(bestHole, { alpha: 1.0 });
}

// ── Hit detection ──
function checkHits(now) {
  if (state !== 'PLAYING') return;
  const elapsed = now - gameStart;

  for (const note of songNotes) {
    if (note.state !== 'pending') continue;
    const diff = elapsed - note.hitTime;

    if (diff > HIT_WINDOW_MS) {
      note.state = 'miss'; combo = 0; updateUI(); continue;
    }

    if (Math.abs(diff) <= HIT_WINDOW_MS && currentNote) {
      if (currentNote.name === note.noteName && currentNote.octave === note.noteOctave) {
        note.state = 'hit';
        const pts = Math.abs(diff) < 100 ? 100 : 50;
        combo++;
        score += pts * comboMultiplier();
        hitNotes++;
        flashHoles.set(note.hole, { alpha: 1.0, color: HOLE_COLORS[note.hole - 1] });
        updateUI();
      }
    }
  }

  if (songNotes.every(n => n.state !== 'pending')) endGame();
}

function comboMultiplier() {
  if (combo >= 30) return 4;
  if (combo >= 20) return 3;
  if (combo >= 10) return 2;
  return 1;
}

function updateUI() {
  document.getElementById('scoreVal').textContent = score.toLocaleString();
  document.getElementById('comboVal').textContent = `×${comboMultiplier()}`;
  const judged = songNotes.filter(n => n.state !== 'pending').length;
  const acc    = judged ? Math.round((hitNotes / judged) * 100) : 0;
  document.getElementById('accVal').textContent = judged ? acc + '%' : '--%';
}

// ── Main loop ──
function loop(now) {
  if (analyser) {
    const buf = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buf);
    const freq = autoCorrelate(buf, audioCtx.sampleRate);
    if (freq > 0) {
      currentNote = freqToNoteInfo(freq);
      document.getElementById('detNote').textContent = currentNote.name;
      document.getElementById('detNote').classList.add('active');
      document.getElementById('detOct').textContent  = currentNote.octave;
      const key = currentNote.name + currentNote.octave;
      if (key !== lastDetectedKey) { lastDetectedKey = key; onNewNoteDetected(currentNote); }
    } else {
      currentNote = null; lastDetectedKey = '';
      document.getElementById('detNote').textContent = '--';
      document.getElementById('detNote').classList.remove('active');
      document.getElementById('detOct').textContent  = '';
    }
  }
  checkHits(now);
  drawHighway(now);
  animId = requestAnimationFrame(loop);
}

// ── Play-along synth ──
function swingBeat(beat, ratio = 0.67) {
  const whole = Math.floor(beat), frac = beat - whole;
  return Math.abs(frac - 0.5) < 0.02 ? whole + ratio : beat;
}

function schedulePlayAlong() {
  stopPlayAlong();
  for (let i = 0; i < songNotes.length; i++) {
    const note      = songNotes[i];
    const freq      = noteToFreq(note.noteName, note.noteOctave);
    const swung     = swingBeat(note.beat);
    const nextSwung = songNotes[i+1] ? swingBeat(songNotes[i+1].beat) : note.beat + 2;
    const jitter    = (Math.random() - 0.5) * 0.024;
    const start     = audioGameStart + (swung + INTRO_BEATS) * beatMs / 1000 + jitter;
    const dur       = Math.min((nextSwung - swung) * beatMs / 1000 * 0.80, 0.55);
    const vel       = 0.14 + Math.random() * 0.06;

    const master = audioCtx.createGain();
    master.gain.setValueAtTime(0, start);
    master.gain.linearRampToValueAtTime(vel, start + 0.016);
    master.gain.setValueAtTime(vel * 0.88, start + Math.min(dur * 0.35, 0.12));
    master.gain.linearRampToValueAtTime(0, start + dur);
    master.connect(audioCtx.destination);

    [
      { mult:1, type:'triangle', vol:1.00 },
      { mult:2, type:'triangle', vol:0.28 },
      { mult:3, type:'sawtooth', vol:0.07 },
    ].forEach(({ mult, type, vol }) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq * mult; g.gain.value = vol;
      o.connect(g); g.connect(master);
      o.start(start); o.stop(start + dur + 0.05);
      playAlongOscs.push(o);
    });
  }
}

function stopPlayAlong() {
  playAlongOscs.forEach(o => { try { o.stop(); } catch {} });
  playAlongOscs = [];
}

// ── Countdown ──
async function startCountdown() {
  state = 'COUNTDOWN';
  for (let i = 3; i >= 1; i--) { countdownVal = i; await delay(900); }
  countdownVal = 0; await delay(600);
  gameStart      = performance.now();
  audioGameStart = audioCtx.currentTime;
  state = 'PLAYING';
  if (document.getElementById('playAlongChk').checked) schedulePlayAlong();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── End game ──
function endGame() {
  state = 'RESULTS';
  stopPlayAlong();
  const acc   = totalNotes ? Math.round((hitNotes / totalNotes) * 100) : 0;
  const grade = acc >= 95 ? 'S' : acc >= 80 ? 'A' : acc >= 65 ? 'B' : acc >= 50 ? 'C' : 'F';
  const label = { S:'Perfect!', A:'Great!', B:'Good!', C:'Keep Practicing', F:'Try Again' };
  document.getElementById('resGrade').textContent = grade;
  document.getElementById('resGrade').className   = `grade ${grade}`;
  document.getElementById('resTitle').textContent = label[grade];
  document.getElementById('resStats').textContent =
    `Score: ${score.toLocaleString()} · ${hitNotes}/${totalNotes} notes · ${acc}% accuracy`;
  document.getElementById('results').classList.add('show');
  document.getElementById('startBtn').textContent = 'START';
  document.getElementById('startBtn').classList.remove('stop');
}

// ── Start / Stop ──
async function startGame() {
  if (!currentSong) return;
  const bpm = parseInt(document.getElementById('bpmRange').value, 10);

  score = 0; combo = 0; hitNotes = 0; flashHoles.clear(); wrongHoles.clear();
  songNotes  = buildNotes(currentSong, bpm);
  totalNotes = songNotes.length;
  updateUI();

  if (!audioCtx) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false }
      });
      audioCtx  = new AudioContext();
      analyser  = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      micSource = audioCtx.createMediaStreamSource(stream);
      micSource.connect(analyser);
    } catch {
      alert('Microphone access required.');
      return;
    }
  }

  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
  await startCountdown();
}

function stopGame() {
  state = 'IDLE';
  stopPlayAlong();
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  songNotes = []; flashHoles.clear(); wrongHoles.clear();
  drawHighway(-1e9);
  document.getElementById('startBtn').textContent = 'START';
  document.getElementById('startBtn').classList.remove('stop');
}

// ── View routing ──
function showPicker() {
  stopGame();
  document.getElementById('results').classList.remove('show');
  document.getElementById('view-highway').style.display = 'none';
  document.getElementById('view-picker').style.display  = '';
  state = 'PICKER';
}

function showHighway(song) {
  currentSong = song;
  document.getElementById('view-picker').style.display  = 'none';
  document.getElementById('view-highway').style.display = 'flex';
  document.getElementById('songNameTag').textContent    = song.title;
  const slider = document.getElementById('bpmRange');
  slider.value = song.bpm;
  document.getElementById('bpmLabel').textContent = song.bpm;
  syncBpmSlider();
  state = 'IDLE';
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

// ── BPM slider fill ──
function syncBpmSlider() {
  const s = document.getElementById('bpmRange');
  const pct = ((s.value - s.min) / (s.max - s.min) * 100).toFixed(1) + '%';
  s.style.setProperty('--pct', pct);
}

// ── Song picker ──
let allSongs = [];

function fuzzyMatch(query, text) {
  if (!query) return true;
  query = query.toLowerCase().trim();
  text  = text.toLowerCase();
  let qi = 0;
  for (const ch of text) {
    if (ch === query[qi]) qi++;
    if (qi === query.length) return true;
  }
  return false;
}

function renderSongGrid(songs) {
  const grid = document.getElementById('songGrid');
  if (!songs.length) {
    grid.innerHTML = '<div class="no-results">No songs match your search.</div>';
    return;
  }
  grid.innerHTML = songs.map(s => `
    <div class="song-card" data-id="${s.id}">
      <div class="song-card-top">
        <div>
          <div class="song-title">${s.title}</div>
          <div class="song-artist">${s.artist}</div>
        </div>
      </div>
      <div class="song-desc">${s.description || ''}</div>
      <div class="song-badges">
        <span class="badge badge-${s.difficulty}">${s.difficulty}</span>
        <span class="badge badge-bpm">${s.bpm} BPM</span>
        <span class="badge badge-holes">Holes ${s.holeRange[0]}–${s.holeRange[1]}</span>
        <span class="badge badge-bpm">${s.timeSignature}</span>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.song-card').forEach(card => {
    card.addEventListener('click', () => {
      const song = window.SONGS_DATA[card.dataset.id];
      if (song) showHighway(song);
    });
  });
}

function loadManifest() {
  allSongs = window.SONGS_MANIFEST || [];
  renderSongGrid(allSongs);
}

document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value;
  const filtered = allSongs.filter(s =>
    fuzzyMatch(q, s.title) || fuzzyMatch(q, s.artist)
  );
  renderSongGrid(filtered);
});

// ── Controls ──
document.getElementById('startBtn').addEventListener('click', async () => {
  if (state === 'IDLE' || state === 'RESULTS') {
    document.getElementById('results').classList.remove('show');
    document.getElementById('startBtn').textContent = 'STOP';
    document.getElementById('startBtn').classList.add('stop');
    await startGame();
  } else if (state === 'PLAYING' || state === 'COUNTDOWN') {
    stopGame();
  }
});

document.getElementById('backBtn').addEventListener('click', showPicker);
document.getElementById('chooseSongBtn').addEventListener('click', showPicker);

document.getElementById('retryBtn').addEventListener('click', () => {
  document.getElementById('results').classList.remove('show');
  document.getElementById('startBtn').textContent = 'STOP';
  document.getElementById('startBtn').classList.add('stop');
  state = 'IDLE';
  startGame();
});

document.getElementById('bpmRange').addEventListener('input', e => {
  document.getElementById('bpmLabel').textContent = e.target.value;
  syncBpmSlider();
});

// ── Init ──
loadManifest();
</script>
</body>
</html>
